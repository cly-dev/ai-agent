name: Codegen Check

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  prisma-codegen-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate Prisma artifacts
        run: pnpm codegen:prisma

      - name: Verify generated files are committed
        run: git diff --exit-code
